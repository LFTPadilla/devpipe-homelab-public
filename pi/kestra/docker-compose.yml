volumes:
  postgres-kestra-data:
    driver: local
  web-kestra-data:
    driver: local

services:
  postgres:
    image: postgres
    volumes:
      - postgres-kestra-data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    image: kestra/kestra:latest
    pull_policy: always
    user: "root"
    command: server standalone
    env_file:
      - .env
    volumes:
      - web-kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd-web:/tmp/kestra-wd
      - ./application.yaml:/etc/config/application.yaml
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: ${KESTRA_DB_PASSWORD}
        kestra:
          #server:
          #  basicAuth:
          #    username: admin@kestra.io # it must be a valid email address
          #    password: ${KESTRA_ADMIN_PASSWORD} # it must be at least 8 characters long with uppercase letter and a number
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8082/
    ports:
      - "8082:8080"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_started
