services:
  anythingllm:
    image: mintplexlabs/anythingllm
    container_name: anythingllm
    restart: unless-stopped
    ports:
      - 3001:3001
    cap_add:
      - SYS_ADMIN
    volumes:
      - /home/felipe/anythingllm:/app/server/storage
      - /home/felipe/anythingllm/.env:/app/server/.env
