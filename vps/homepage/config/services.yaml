- Photos:
  - Immich — Felipe:
      icon: immich.png
      href: https://immich.yourdomain.com
      description: Personal photo library
      widget:
        type: customapi
        url: http://<pi-tailscale-ip>:2283/api/server/statistics
        headers:
          x-api-key: YOUR_IMMICH_API_KEY
        mappings:
          - field: photos
            label: Photos
            format: number
          - field: videos
            label: Videos
            format: number
